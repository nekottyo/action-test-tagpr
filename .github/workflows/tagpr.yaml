name: tagpr
on:
  push:
    branches:
      - main

jobs:
  list-changed-directories:
    runs-on: ubuntu-latest

    outputs:
      changed-directories: ${{ steps.list-changed-directories.outputs.changed-directories }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: sankichi92/list-changed-directories@1a7ce7073846c0f941d2d3dd7597974022907889 # v1.2.1
        id: list-changed-directories
        with:
          target-file: .tagpr

  tagpr:
    runs-on: ubuntu-latest
    needs: list-changed-directories
    if: needs.list-changed-directories.outputs.changed-directories != '[]'
    strategy:
      matrix:
        working-directory: ${{ fromJSON(needs.list-changed-directories.outputs.changed-directories) }}
    steps:
      - uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          token: ${{ steps.app-token.outputs.token }}

      - uses: Songmu/tagpr@b3fb89424646b06c8aa460f50307c60b6a541425 # v1.17.1
        with:
          config: ${{ matrix.working-directory }}/.tagpr
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
